[server]
host     = 127.0.0.1
port     = 5000

[database]
path     = arena.db
wal_mode = true

[auth]
session_hours    = 8
min_password_len = 8
min_username_len = 3

[game]
name         = Vault Zero
version      = 1.0
time_limit_s = 900
rooms        = storage,lab,server,vault

[lua]
event_script = quests/events.lua

[ui]
window_title  = Vault Zero
window_w      = 1280
window_h      = 760
font_mono     = Courier New
font_size_cli = 12
font_size_gui = 13
theme         = dark

[logging]
log_file = game.log
level    = INFO
